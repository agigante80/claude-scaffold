name: Design / UX Task
description: Wireframes, visual assets, UX improvements, accessibility
labels: ["design"]
body:
  - type: markdown
    attributes:
      value: |
        <!-- template-version: 4 -->
        ## Design / UX Task
        For wireframes, visual assets, UX improvements, and accessibility work.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What design work is needed and why?
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 - Critical
        - P1 - High
        - P2 - Medium
        - P3 - Low
    validations:
      required: true

  - type: dropdown
    id: platforms
    attributes:
      label: Platform(s)
      multiple: true
      options:
        - Mobile app
        - Web frontend
        - Both
    validations:
      required: true

  - type: textarea
    id: screens
    attributes:
      label: Screens / components affected
      description: Which screens or UI components does this touch?
      placeholder: |
        - Onboarding -> Role selection screen
        - Dashboard -> User card component
    validations:
      required: true

  - type: textarea
    id: wireframes
    attributes:
      label: Wireframe references
      description: Link to existing wireframes if updating, or describe new ones needed.
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true for this design work to be complete?
      placeholder: |
        - [ ] Wireframe created and approved
        - [ ] All text uses i18n keys
    validations:
      required: true

  - type: textarea
    id: accessibility
    attributes:
      label: Accessibility requirements
      description: WCAG 2.2 AA requirements for this design work.
      value: |
        - [ ] Touch targets >= 44x44dp
        - [ ] Color contrast >= 4.5:1 (normal text) / 3:1 (large text)
        - [ ] Focus order annotated
        - [ ] Screen reader labels (aria-label) specified
        - [ ] prefers-reduced-motion considered
    validations:
      required: true

  - type: textarea
    id: brand
    attributes:
      label: Brand consistency
      description: Verify brand guidelines are followed.
      value: |
        - [ ] Primary brand colors used correctly
        - [ ] Typography scale followed
        - [ ] Icon family consistent
    validations:
      required: true

  - type: textarea
    id: scenarios
    attributes:
      label: Test scenarios (Given / When / Then)
      description: |
        One positive and one negative scenario per design condition being addressed.
      placeholder: |
        **Condition: [name the condition]**

        Positive
        - Given: [valid starting state]
        - When: [action is performed]
        - Then: [expected correct result]

        Negative
        - Given: [invalid or edge-case state]
        - When: [action is performed]
        - Then: [expected error / rejection message]
    validations:
      required: true

  - type: checkboxes
    id: agent_reviews
    attributes:
      label: Required reviews (mandatory)
      description: |
        The gate orchestrators auto-select which specialist agents to run based on labels and content.
        All selected agents must score 10/10 before implementation begins.
      options:
        - label: "**ticket-gate** - mandatory before implementation. Runs 5 core agents (Security, Architect, Developer, QA, GDPR) + dynamic agents based on labels. All must score 10/10."
          required: true
